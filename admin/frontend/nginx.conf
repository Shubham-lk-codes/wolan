server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /api/v1/admin/ { proxy_pass http://admin-api:5000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
  location /api/v1/public/ { proxy_pass http://admin-api:5000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
  location /api/v1/tracking/ { proxy_pass http://admin-api:5000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
  location /socket.io/ { proxy_pass http://admin-api:5000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
  location / { try_files $uri $uri/ /index.html; }
}
